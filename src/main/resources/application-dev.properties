spring.application.name=ms-ia

# ================================
#     Base de datos PostgreSQL
# ================================
spring.datasource.url=jdbc:postgresql://postgres:5432/iuscloud_ai
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
server.port=8087
server.servlet.context-path=/ms-ia/

# ================================
#      Carga de archivos (PDF para análisis)
# ================================
spring.servlet.multipart.max-file-size=32MB
spring.servlet.multipart.max-request-size=32MB

# ================================
#      Configuracion Flyway
# ================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ================================
#      SPRING SECURITY / JWT
# ================================
security.jwt.secret=${SECURITY_JWT_SECRET:zxfQiQ/OOKEMgvaetUUVY6aejYur6X5OSonLrKEwBWempbBEFoN/aruX5o4JY7eQy6TTY/9PLlRKdBlx2RgWoA==}
security.jwt.expiration=86400000

# ================================
#      Anthropic / Claude
# ================================
anthropic.api-key=${ANTHROPIC_API_KEY:}
anthropic.model=${ANTHROPIC_MODEL:claude-sonnet-4-6}
anthropic.max-tokens=${ANTHROPIC_MAX_TOKENS:8000}

# ================================
#      Actuator
# ================================
management.endpoints.web.exposure.include=health
management.endpoint.health.access=unrestricted

# ================================
#      Servicios externos
# ================================
auth.service.url=${AUTH_SERVICE_URL:http://auth:8081/ms-auth}
legal.core.service.url=${LEGAL_CORE_SERVICE_URL:http://legal_core:8082/legal-core}
# OJO: el guion bajo (ms_plans) es invalido en un hostname y Tomcat rechaza el Host con 400.
# Como PlansLimitsClient es fail-open, el tope de tokens quedaba desactivado en silencio.
plans.service.url=${PLANS_SERVICE_URL:http://iuscloud-ms-plans:8086/ms-plans}
internal.api.key=${INTERNAL_API_KEY:ius-cloud-internal-secret-2024}

# Zona horaria para el corte mensual del consumo de tokens de IA
ai.usage.reset-zone=${AI_USAGE_RESET_ZONE:America/Bogota}

# ================================
#      Análisis de PDF por URL (presigned URLs de MinIO) — anti-SSRF
# ================================
# Hosts autorizados para descargar PDFs. Vacío = descarga por URL deshabilitada.
# OJO en dev: legalCore firma las presigned URL con host 'localhost:9000', que NO
# es alcanzable desde el contenedor ms_ia. Para probar end-to-end, ejecuta ms-ia
# fuera de Docker o ajusta minio.public-endpoint de legalCore a un host común.
documents.download.allowed-hosts=${DOC_DOWNLOAD_ALLOWED_HOSTS:localhost:9000,iuscloud-minio:9000}
documents.download.max-bytes=${DOC_DOWNLOAD_MAX_BYTES:33554432}

# ================================
#      Bloqueo por abuso (prompt injection) — cooldown por usuario
# ================================
# Tras 'threshold' intentos detectados dentro de 'window-minutes', el usuario queda
# bloqueado de la IA hasta que esos intentos salgan de la ventana (auto-liberable).
ai.abuse.threshold=${AI_ABUSE_THRESHOLD:3}
ai.abuse.window-minutes=${AI_ABUSE_WINDOW_MINUTES:60}

# ================================
#      Optimización de tokens
# ================================
# Máximo de mensajes previos reenviados como contexto del chat (acota costo).
chat.history.max-messages=${CHAT_HISTORY_MAX_MESSAGES:20}
